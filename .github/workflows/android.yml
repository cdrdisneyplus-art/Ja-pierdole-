name: Build Paski Future 1.0 APK

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: "Build variant"
        required: true
        default: "debug"
        type: choice
        options:
          - debug

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Linux dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            autoconf automake libtool \
            libltdl-dev pkg-config \
            zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev \
            build-essential \
            ccache \
            libstdc++6

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            buildozer==1.5.0 \
            cython==0.29.36 \
            virtualenv

      - name: Initialize Android SDK + NDK
        run: |
          mkdir -p artifacts
          (yes || true) | buildozer android update 2>&1 | tee artifacts/buildozer-update.log
          exit ${PIPESTATUS[1]}

      - name: Accept Android licenses
        run: |
          for sdk_root in \
            "$ANDROID_SDK_ROOT" \
            "$ANDROID_HOME" \
            "$HOME/.buildozer/android/platform/android-sdk"; do
              if [ -d "$sdk_root" ]; then
                if [ -f "$sdk_root/cmdline-tools/latest/bin/sdkmanager" ]; then
                  yes | "$sdk_root/cmdline-tools/latest/bin/sdkmanager" --licenses
                fi
              fi
          done

      - name: Build APK
        run: |
          mkdir -p artifacts
          (yes || true) | buildozer android debug 2>&1 | tee artifacts/buildozer.log
          exit ${PIPESTATUS[1]}

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-logs
          path: |
            artifacts/buildozer-update.log
            artifacts/buildozer.log
          if-no-files-found: warn

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: paski-future-apk
          path: bin/*.apk
          if-no-files-found: error
