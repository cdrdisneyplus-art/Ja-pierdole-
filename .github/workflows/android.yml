name: Build Paski Future APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Run actions/checkout@v4
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
        git zip unzip autoconf libtool pkg-config \
        zlib1g-dev libncurses5-dev \
        libtinfo6 cmake libffi-dev \
        libssl-dev

    - name: Install Buildozer toolchain
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    - name: Initialize Android SDK/NDK
      run: |

        mkdir -p ~/.android
        touch ~/.android/repositories.cfg

        export ANDROID_HOME=$HOME/android-sdk
        mkdir -p $ANDROID_HOME

        cd $HOME

        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O sdk.zip
        unzip sdk.zip

        mkdir -p $ANDROID_HOME/cmdline-tools
        mv cmdline-tools $ANDROID_HOME/cmdline-tools/latest

        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME \
        "platform-tools" \
        "platforms;android-33" \
        "build-tools;33.0.2" \
        "ndk;25.2.9519653"

    - name: Accept Android SDK licenses
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

    - name: Build APK
      run: |
        buildozer android debug

    - name: Upload build logs
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: .buildozer/**/*.log

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: paski-future-apk
        path: bin/*.apk
